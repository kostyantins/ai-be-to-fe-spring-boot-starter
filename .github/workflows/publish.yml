name: Publish to GitHub Packages

# Publishes the starter JAR to GitHub Packages Maven registry on every push to master.
# The counter project (and any other consumer) resolves the artifact from there.
on:
  push:
    branches: [ "master" ]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Injects <server id="github"> into ~/.m2/settings.xml automatically
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Publish JAR to GitHub Packages
        run: mvn --batch-mode deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

